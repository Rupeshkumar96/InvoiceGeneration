{% extends 'base.html' %}
{% block content %}
<h2>Login</h2>

<div class="card">
<form method="post">
    <input name="username" placeholder="Username" required><br><br>
    <input type="password" name="password" placeholder="Password" required><br><br>
    <button type="submit">Login</button>
</form>
<p>New user? <a href="/register">Register</a></p>
</div>
{% endblock %}
