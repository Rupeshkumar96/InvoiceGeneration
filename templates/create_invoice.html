{% extends 'base.html' %}
{% block content %}
<h2>Create Invoice</h2>

<div class="card">
<form method="post">
    <select name="customer" required>
        {% for c in customers %}
        <option value="{{ c.name }}">{{ c.name }}</option>
        {% endfor %}
    </select><br><br>
    <input name="amount" type="number" step="0.01" placeholder="Amount" required><br><br>
    <button type="submit">Create Invoice</button>
</form>
</div>
{% endblock %}
