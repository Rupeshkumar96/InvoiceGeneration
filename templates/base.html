<!DOCTYPE html>
<html>
<head>
    <title>Invoice System</title>
    <style>
        body{font-family:Arial;background:#f4f6f9;margin:0}
        .navbar{background:#2c3e50;color:white;padding:15px}
        .navbar a{color:white;margin-right:15px;text-decoration:none;font-weight:bold}
        .container{padding:20px}
        input, select{width: 100%;height: 30px;}
        .card{background:white;padding:20px;border-radius:8px;box-shadow:0 0 10px rgba(0,0,0,0.1);max-width:100%}
        table{width:100%;border-collapse:collapse;background:white}
        th,td{padding:10px;border:1px solid #ddd;text-align:center}
        th{background:#34495e;color:white}
        button{padding:8px 15px;background:#3498db;color:white;border:none;border-radius:4px}
        .badge-paid{color:green;font-weight:bold}
        .badge-pending{color:orange;font-weight:bold}
    </style>
</head>
<body>

<div class="navbar">
    <a href="/">Dashboard</a>
    <a href="/add_customer">Add Customer</a>
    <a href="/create_invoice">Create Invoice</a>
    <a href="/invoices">Invoices</a>
    <span style="float:right">
        {{ current_user.username }} |
        <a href="/logout">Logout</a>
    </span>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
